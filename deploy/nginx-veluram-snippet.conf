# ═══════════════════════════════════════════════════════════════════════════════
# FinanceMe — veluram.com nginx reverse-proxy snippet
# ═══════════════════════════════════════════════════════════════════════════════
#
# Add this block inside the server {} block of veluram.com's nginx config.
# It proxies veluram.com/finance/* to the FinanceMe VM running on its own
# GCP e2-micro instance.
#
# Steps:
#   1. Deploy FinanceMe on a separate GCP VM using deploy/setup-gcp.sh
#   2. Note the FinanceMe VM's external IP (e.g. 10.128.0.5 internal or 34.x.x.x external)
#   3. Replace FINANCEME_VM_IP below with that IP
#   4. Paste this block into /etc/nginx/sites-available/veluram.com inside server {}
#   5. Run: sudo nginx -t && sudo systemctl reload nginx
# ═══════════════════════════════════════════════════════════════════════════════

    # Proxy all /finance/* traffic to the FinanceMe VM.
    # The trailing slash in proxy_pass strips the /finance/ prefix before forwarding,
    # so veluram.com/finance/api/expenses → FinanceMe VM's /api/expenses.
    location /finance/ {
        proxy_pass http://FINANCEME_VM_IP/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        client_max_body_size 15M;
    }
